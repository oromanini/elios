name: Backend Auth Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test-backend-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run auth regression tests
        env:
          MONGO_ATLAS_URI: mongodb://localhost:27017
        run: pytest -q tests/test_auth_flow.py
