name: Deploy ELIOS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: elios-492418
  REGION: us-central1
  WIF_PROVIDER: projects/513240742946/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SA_EMAIL: github-actions-deployer@elios-492418.iam.gserviceaccount.com
  REPOSITORY: elios

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init

      # PASSO 1: Cria apenas a Garagem (Artifact Registry) e WIF
      - name: Terraform Apply (Base Infra)
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -target=google_artifact_registry_repository.docker \
            -target=google_iam_workload_identity_pool.github \
            -target=google_iam_workload_identity_pool_provider.github \
            -target=google_service_account.github_actions \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repository=${{ github.event.repository.name }}"

      # PASSO 2: Build e Push das Imagens (Agora a garagem já existe!)
      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and Push Backend
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Build and Push Frontend
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:latest"
          docker build -t "$IMAGE" ./frontend
          docker push "$IMAGE"

      # PASSO 3: Terraform Apply Completo (Agora o Cloud Run vai achar as imagens!)
      - name: Terraform Apply (Full Deploy)
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repository=${{ github.event.repository.name }}" \
            -var="mongo_atlas_uri=${{ secrets.MONGO_ATLAS_URI }}" \
            -var="r2_access_key=${{ secrets.R2_ACCESS_KEY }}" \
            -var="r2_secret_key=${{ secrets.R2_SECRET_KEY }}" \
            -var="r2_endpoint=${{ secrets.R2_ENDPOINT }}" \
            -var="r2_bucket_name=${{ secrets.R2_BUCKET_NAME }}" \
            -var="user=${{ secrets.USER }}" \
            -var="password=${{ secrets.PASSWORD }}"