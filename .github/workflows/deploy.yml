name: Deploy ELIOS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: elios-492418
  REGION: us-central1
  WIF_PROVIDER: projects/513240742946/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SA_EMAIL: github-actions-deployer@elios-492418.iam.gserviceaccount.com
  REPOSITORY: elios

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init

      # PASSO 1: Cria apenas a Garagem (Artifact Registry) e WIF
      - name: Terraform Apply (Base Infra)
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -target=google_artifact_registry_repository.docker \
            -target=google_iam_workload_identity_pool.github \
            -target=google_iam_workload_identity_pool_provider.github \
            -target=google_service_account.github_actions \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repository=${{ github.event.repository.name }}"

      # PASSO 2: Build e Push das Imagens (Agora a garagem já existe!)
      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and Push Backend
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      # PASSO 3: Deploy direto no Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: elios-api
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest
          env_vars: |-
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_ATLAS_URI=${{ secrets.MONGO_ATLAS_URI }}
            ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            GROQ_BASE_URL=${{ secrets.GROQ_BASE_URL }}
            GROQ_MODEL=${{ secrets.GROQ_MODEL }}
            GROQ_FORM_MODEL=${{ secrets.GROQ_FORM_MODEL }}
            R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
            R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_BASE_URL=${{ secrets.R2_PUBLIC_BASE_URL }}
            EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}
          flags: --allow-unauthenticated

      - name: Build and Push Frontend
        run: |
          BACKEND_URL=$(gcloud run services describe elios-api --region=${{ env.REGION }} --format='value(status.url)')

          docker build \
            --build-arg VITE_API_URL=$BACKEND_URL \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:latest \
            ./frontend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:latest

      - name: Deploy Frontend
        run: |
          BACKEND_URL=$(gcloud run services describe elios-api --region=${{ env.REGION }} --format='value(status.url)')
          gcloud run deploy elios-web \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:latest \
            --region=${{ env.REGION }} \
            --set-env-vars="VITE_API_URL=$BACKEND_URL" \
            --allow-unauthenticated
