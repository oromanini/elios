name: Deploy ELIOS to Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  PROJECT_ID: elios-492418
  REGION: us-central1
  WIF_PROVIDER: projects/513240742946/locations/global/workloadIdentityPools/elios-wif-pool/providers/elios-wif-provider
  SA_EMAIL: elios-deployer@elios-492418.iam.gserviceaccount.com
  REPOSITORY: elios
  BACKEND_SERVICE: elios-api
  FRONTEND_SERVICE: elios-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init -input=false

      - name: Terraform apply (infra base)
        working-directory: ./terraform
        run: |
          terraform apply -input=false -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="project_number=${{ secrets.GCP_PROJECT_NUMBER }}" \
            -var="region=${{ env.REGION }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repository=${{ github.event.repository.name }}" \
            -var="mongo_url=${{ secrets.MONGO_URL }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -var="r2_access_key=${{ secrets.R2_ACCESS_KEY }}" \
            -var="r2_secret_key=${{ secrets.R2_SECRET_KEY }}" \
            -var="r2_endpoint=${{ secrets.R2_ENDPOINT }}" \
            -var="r2_bucket_name=${{ secrets.R2_BUCKET_NAME }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="groq_api_key=${{ secrets.GROQ_API_KEY }}" \
            -var="user=${{ secrets.USER }}" \
            -var="password=${{ secrets.PASSWORD }}"

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          BACKEND_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${IMAGE_TAG}"
          docker build -t "${BACKEND_IMAGE}" ./backend
          docker push "${BACKEND_IMAGE}"
          echo "BACKEND_IMAGE=${BACKEND_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --image="${{ env.BACKEND_IMAGE }}" \
            --set-env-vars="ENV=production,DB_NAME=${{ secrets.DB_NAME }},MONGO_URL=${{ secrets.MONGO_URL }},R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }},R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }},R2_ENDPOINT=${{ secrets.R2_ENDPOINT }},R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }},JWT_SECRET=${{ secrets.JWT_SECRET }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},USER=${{ secrets.USER }},PASSWORD=${{ secrets.PASSWORD }}"

      - name: Capture backend URL
        run: |
          BACKEND_URL="$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" --project="${{ env.PROJECT_ID }}" --region="${{ env.REGION }}" --format='value(status.url)')"
          echo "BACKEND_URL=${BACKEND_URL}" >> "$GITHUB_ENV"

      - name: Build and push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FRONTEND_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${IMAGE_TAG}"
          docker build \
            --build-arg VITE_API_URL="${{ env.BACKEND_URL }}" \
            -t "${FRONTEND_IMAGE}" \
            ./frontend
          docker push "${FRONTEND_IMAGE}"
          echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy "${{ env.FRONTEND_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --image="${{ env.FRONTEND_IMAGE }}" \
            --set-env-vars="VITE_API_URL=${{ env.BACKEND_URL }}"
