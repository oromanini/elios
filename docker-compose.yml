services:
  mongo:
    image: mongo:7
    container_name: elios-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: elios-backend
    restart: unless-stopped
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_ATLAS_URI: mongodb://mongo:27017
      DB_NAME: elios
      JWT_SECRET: change-this-in-production
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: elios-frontend
    restart: unless-stopped
    command: >
      sh -c "npm install && npm start"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  mongo_data:
  frontend_node_modules:
